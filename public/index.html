<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>同城速配 - 点餐系统</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏍️ 同城速配</h1>
            <div class="role-tabs">
                <button class="role-btn active" data-role="customer">👤 用户</button>
                <button class="role-btn" data-role="merchant">🏪 商家</button>
                <button class="role-btn" data-role="courier">📦 快递员</button>
            </div>
        </header>

        <!-- 用户面板 -->
        <div id="customerPanel" class="panel active">
            <div class="card order-form">
                <h3>📝 新订单</h3>
                <input type="text" id="custName" placeholder="收货人姓名" autocomplete="off">
                <input type="tel" id="custPhone" placeholder="联系电话（将作为账号）" autocomplete="off">
                <textarea id="custAddress" rows="2" placeholder="详细地址" autocomplete="off"></textarea>
                
                <div id="dishList" style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 12px; font-weight: 500;">请选择菜品（可多选）：</label>
                    <div id="dishOptionsContainer" style="display: flex; flex-direction: column; gap: 12px;"></div>
                </div>
                <button id="submitOrderBtn" class="btn primary">✅ 立即下单</button>
            </div>

            <div id="authArea" class="card" style="display: block;">
                <h3>🔐 登录</h3>
                <div id="loginForm">
                    <input type="tel" id="loginPhone" placeholder="手机号" autocomplete="off">
                    <input type="password" id="loginPassword" placeholder="密码">
                    <button id="doLoginBtn" class="btn primary">登录/注册</button>
                </div>
                <div id="authMessage" style="margin-top: 12px; font-size: 0.8rem; color: red;"></div>
            </div>

            <div id="myOrdersArea" class="card" style="display: none;">
                <h3>📋 我的订单</h3>
                <div id="customerOrdersList" class="order-list">
                    <div class="empty-tip">暂无订单，快去下一单吧~</div>
                </div>
                <button id="logoutBtnCustomer" class="btn small" style="margin-top: 12px; width: auto;">退出登录</button>
            </div>
        </div>

        <!-- 商家面板 -->
        <div id="merchantPanel" class="panel">
            <div class="stats-badge">📊 未派送订单: <span id="undispatchedCount">0</span></div>
            <div class="card">
                <h3>🏪 所有订单</h3>
                <div id="merchantOrdersList" class="order-list"><div class="empty-tip">暂无订单</div></div>
            </div>
            <div class="card">
                <h3>🍽️ 菜品管理</h3>
                <div id="dishManagementList" class="dish-manage-list"></div>
                <button id="addDishBtn" class="btn small primary" style="margin-top: 12px;">+ 添加菜品</button>
            </div>
        </div>

        <!-- 快递员面板 -->
        <div id="courierPanel" class="panel">
            <div class="stats-badge">🚚 待配送订单: <span id="deliveringCount">0</span></div>
            <div class="card">
                <h3>📬 配送任务</h3>
                <div id="courierOrdersList" class="order-list"><div class="empty-tip">暂无配送任务</div></div>
            </div>
        </div>
    </div>

    <!-- 身份选择模态框 -->
    <div id="roleModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>选择您的身份</h3>
            <div id="roleOptions" class="role-options">
                <div class="role-option" data-role="customer">
                    <span class="role-icon">👤</span>
                    <span class="role-name">普通用户</span>
                    <span class="role-desc">点餐下单</span>
                </div>
                <div class="role-option" data-role="merchant">
                    <span class="role-icon">🏪</span>
                    <span class="role-name">商家</span>
                    <span class="role-desc">管理订单、接单</span>
                </div>
                <div class="role-option" data-role="courier">
                    <span class="role-icon">📦</span>
                    <span class="role-name">快递员</span>
                    <span class="role-desc">配送订单</span>
                </div>
            </div>
            <button id="closeModalBtn" class="btn small">取消</button>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
