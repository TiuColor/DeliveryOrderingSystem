<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>老刘家晚风饭包</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

    <!-- 顶部标题 -->
    <header>
        <h1>🍱 老刘家晚风饭包</h1>
    </header>

    <!-- 主内容区域 -->
    <main id="mainContent">
        <!-- ========== 首页面板 ========== -->
        <div id="panelHome" class="panel active">
            <div id="homeContent"></div>
        </div>

        <!-- ========== 我的订单面板（仅用户） ========== -->
        <div id="panelOrders" class="panel" style="display:none;">
            <div class="card">
                <h3>📋 我的订单</h3>
                <div id="customerOrdersList" class="order-list">
                    <div class="empty-tip">暂无订单，快去下一单吧~</div>
                </div>
            </div>
        </div>

        <!-- ========== 菜品管理面板（仅商家） ========== -->
        <div id="panelDishes" class="panel" style="display:none;">
            <div class="card">
                <h3>🍽️ 菜品管理</h3>
                <div id="dishManagementList" class="dish-manage-list"></div>
                <!-- 添加按钮移到这里 -->
                <button id="addDishBtn" class="btn primary" style="margin-top: 16px;">+ 添加菜品</button>
                <!-- 统一的保存按钮放在最下方 -->
                <button id="saveAllDishesBtn" class="btn primary" style="margin-top: 12px;">保存所有修改</button>
            </div>
        </div>

        <!-- ========== 我的面板（所有角色） ========== -->
        <div id="panelProfile" class="panel" style="display:none;">
            <div class="card">
                <h3>👤 我的</h3>
                <div id="profileContent"></div>
            </div>
        </div>
    </main>

    <!-- 底部导航栏 -->
    <nav id="bottomNav" class="bottom-nav">
        <!-- 由JS动态生成 -->
    </nav>

    <!-- 身份选择模态框 -->
    <div id="roleModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>选择您的身份</h3>
            <div id="roleOptions" class="role-options">
                <div class="role-option" data-role="customer">
                    <span class="role-icon">👤</span>
                    <span class="role-name">普通用户</span>
                    <span class="role-desc">点餐下单</span>
                </div>
                <div class="role-option" data-role="merchant">
                    <span class="role-icon">🏪</span>
                    <span class="role-name">商家</span>
                    <span class="role-desc">管理订单、接单</span>
                </div>
                <div class="role-option" data-role="courier">
                    <span class="role-icon">📦</span>
                    <span class="role-name">快递员</span>
                    <span class="role-desc">配送订单</span>
                </div>
            </div>
            <button id="closeModalBtn" class="btn small">取消</button>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
